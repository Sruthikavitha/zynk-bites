<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYNK - Complete Payment Integration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 800px;
            width: 100%;
            backdrop-filter: blur(10px);
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #1f2937;
            font-weight: 700;
        }
        
        p {
            font-size: 1.2em;
            color: #6b7280;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
        }
        
        .btn-primary {
            background: #16a34a;
            color: white;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }
        
        .btn-primary:hover {
            background: #15803d;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
        }
        
        .btn-secondary {
            background: #e5e7eb;
            color: #374151;
        }
        
        .btn-secondary:hover {
            background: #d1d5db;
            transform: translateY(-2px);
        }
        
        .payment-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .payment-modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-header {
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
            color: white;
            padding: 30px;
            border-radius: 20px 20px 0 0;
            margin: -40px -40px 30px -40px;
        }
        
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e5e7eb;
        }
        
        .tab {
            padding: 15px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: #6b7280;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .tab.active {
            color: #16a34a;
            border-bottom-color: #16a34a;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #16a34a;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .success-message {
            background: #dcfce7;
            color: #166534;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            font-weight: 600;
        }
        
        .processing {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 ZYNK - Complete Payment Integration</h1>
        <p>Real Razorpay payment processing with card, UPI, and netbanking support</p>
        
        <div class="btn-group">
            <button class="btn btn-primary" onclick="openPaymentModal(4499)">
                💳 Pay ₹4,499 (Standard Plan)
            </button>
            <button class="btn btn-secondary" onclick="openPaymentModal(2999)">
                💳 Pay ₹2,999 (Basic Plan)
            </button>
            <button class="btn btn-secondary" onclick="openPaymentModal(5999)">
                💳 Pay ₹5,999 (Premium Plan)
            </button>
        </div>
        
        <div id="successMessage" class="success-message" style="display: none;">
            🎉 Payment successful! Your subscription has been activated.
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="payment-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Secure Payment</h2>
                <p id="paymentAmount">Amount: ₹4,499</p>
                <button class="close-btn" onclick="closePaymentModal()">×</button>
            </div>
            
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('card')">💳 Card</button>
                <button class="tab" onclick="switchTab('upi')">📱 UPI</button>
                <button class="tab" onclick="switchTab('netbanking')">🏦 Netbanking</button>
            </div>
            
            <!-- Card Payment -->
            <div id="cardTab" class="tab-content active">
                <div class="form-group">
                    <label>Card Number</label>
                    <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19">
                </div>
                <div class="form-group">
                    <label>Cardholder Name</label>
                    <input type="text" id="cardName" placeholder="John Doe">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Expiry</label>
                        <input type="text" id="cardExpiry" placeholder="MM/YY" maxlength="5">
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="password" id="cardCvv" placeholder="123" maxlength="3">
                    </div>
                </div>
                <button class="btn btn-primary" style="width: 100%;" onclick="processCardPayment()">
                    Pay Now
                </button>
            </div>
            
            <!-- UPI Payment -->
            <div id="upiTab" class="tab-content">
                <div class="form-group">
                    <label>UPI ID</label>
                    <input type="text" id="upiId" placeholder="yourname@upi">
                </div>
                <button class="btn btn-primary" style="width: 100%;" onclick="processUpiPayment()">
                    Pay with UPI
                </button>
            </div>
            
            <!-- Netbanking Payment -->
            <div id="netbankingTab" class="tab-content">
                <div class="form-group">
                    <label>Select Bank</label>
                    <select id="bankSelect" style="width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 16px;">
                        <option value="">Choose your bank</option>
                        <option value="hdfc">HDFC Bank</option>
                        <option value="icici">ICICI Bank</option>
                        <option value="sbi">State Bank of India</option>
                        <option value="pnb">Punjab National Bank</option>
                        <option value="bob">Bank of Baroda</option>
                    </select>
                </div>
                <button class="btn btn-primary" style="width: 100%;" onclick="processNetbankingPayment()">
                    Pay with Netbanking
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentAmount = 4499;
        
        function openPaymentModal(amount) {
            currentAmount = amount;
            document.getElementById('paymentAmount').textContent = `Amount: ₹${amount.toLocaleString('en-IN')}`;
            document.getElementById('paymentModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closePaymentModal() {
            document.getElementById('paymentModal').classList.remove('active');
            document.body.style.overflow = 'auto';
            clearForm();
        }
        
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabName + 'Tab').classList.add('active');
            event.target.classList.add('active');
        }
        
        function clearForm() {
            document.getElementById('cardNumber').value = '';
            document.getElementById('cardName').value = '';
            document.getElementById('cardExpiry').value = '';
            document.getElementById('cardCvv').value = '';
            document.getElementById('upiId').value = '';
            document.getElementById('bankSelect').value = '';
        }
        
        function formatCardNumber(value) {
            const v = value.replace(/\s+/g, '').replace(/[^0-9]/gi, "");
            const matches = v.match(/\d{4,16}/g);
            const match = matches && matches[0] || "";
            const parts = [];
            for (let i = 0, len = match.length; i < len; i += 4) {
                parts.push(match.substring(i, i + 4));
            }
            return parts.length > 0 ? parts.join(" ") : v;
        }
        
        function formatExpiry(value) {
            const v = value.replace(/\s+/g, "").replace(/[^0-9]/gi, "");
            if (v.length >= 2) {
                return v.slice(0, 2) + "/" + v.slice(2, 4);
            }
            return v;
        }
        
        // Add input formatting
        document.getElementById('cardNumber').addEventListener('input', function(e) {
            e.target.value = formatCardNumber(e.target.value);
        });
        
        document.getElementById('cardExpiry').addEventListener('input', function(e) {
            e.target.value = formatExpiry(e.target.value);
        });
        
        document.getElementById('cardCvv').addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/\D/g, '').slice(0, 3);
        });
        
        function loadRazorpayScript() {
            return new Promise((resolve, reject) => {
                if (window.Razorpay) {
                    resolve();
                    return;
                }
                const script = document.createElement('script');
                script.src = 'https://checkout.razorpay.com/v1/checkout.js';
                script.onload = resolve;
                script.onerror = reject;
                document.body.appendChild(script);
            });
        }
        
        async function processCardPayment() {
            const cardNumber = document.getElementById('cardNumber').value;
            const cardName = document.getElementById('cardName').value;
            const cardExpiry = document.getElementById('cardExpiry').value;
            const cardCvv = document.getElementById('cardCvv').value;
            
            if (!cardNumber || !cardName || !cardExpiry || !cardCvv) {
                alert('Please fill in all card details');
                return;
            }
            
            try {
                await loadRazorpayScript();
                
                const options = {
                    key: 'rzp_test_STz4joVjA8LzYP',
                    amount: currentAmount * 100,
                    currency: 'INR',
                    name: 'ZYNK Bites',
                    description: 'Subscription payment',
                    handler: function (response) {
                        console.log('Payment successful:', response);
                        closePaymentModal();
                        showSuccess();
                    },
                    prefill: {
                        name: cardName,
                        email: '',
                        contact: ''
                    },
                    theme: {
                        color: '#16a34a'
                    },
                    modal: {
                        ondismiss: function() {
                            console.log('Payment modal dismissed');
                        }
                    }
                };
                
                const rzp = new Razorpay(options);
                rzp.open();
                
            } catch (error) {
                console.error('Payment error:', error);
                alert('Payment failed. Please try again.');
            }
        }
        
        async function processUpiPayment() {
            const upiId = document.getElementById('upiId').value;
            
            if (!upiId) {
                alert('Please enter your UPI ID');
                return;
            }
            
            try {
                await loadRazorpayScript();
                
                const options = {
                    key: 'rzp_test_STz4joVjA8LzYP',
                    amount: currentAmount * 100,
                    currency: 'INR',
                    name: 'ZYNK Bites',
                    description: 'Subscription payment',
                    handler: function (response) {
                        console.log('Payment successful:', response);
                        closePaymentModal();
                        showSuccess();
                    },
                    prefill: {
                        contact: upiId,
                        email: ''
                    },
                    theme: {
                        color: '#16a34a'
                    }
                };
                
                const rzp = new Razorpay(options);
                rzp.open();
                
            } catch (error) {
                console.error('Payment error:', error);
                alert('Payment failed. Please try again.');
            }
        }
        
        async function processNetbankingPayment() {
            const bank = document.getElementById('bankSelect').value;
            
            if (!bank) {
                alert('Please select your bank');
                return;
            }
            
            try {
                await loadRazorpayScript();
                
                const options = {
                    key: 'rzp_test_STz4joVjA8LzYP',
                    amount: currentAmount * 100,
                    currency: 'INR',
                    name: 'ZYNK Bites',
                    description: 'Subscription payment',
                    handler: function (response) {
                        console.log('Payment successful:', response);
                        closePaymentModal();
                        showSuccess();
                    },
                    theme: {
                        color: '#16a34a'
                    }
                };
                
                const rzp = new Razorpay(options);
                rzp.open();
                
            } catch (error) {
                console.error('Payment error:', error);
                alert('Payment failed. Please try again.');
            }
        }
        
        function showSuccess() {
            document.getElementById('successMessage').style.display = 'block';
            setTimeout(() => {
                document.getElementById('successMessage').style.display = 'none';
            }, 5000);
        }
        
        // Log that the page loaded successfully
        console.log('✅ ZYNK Payment Integration loaded successfully!');
        console.log('🚀 Real Razorpay payment processing ready!');
    </script>
</body>
</html>
