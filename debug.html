<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYNK Debug Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #1f2937;
            margin-bottom: 20px;
        }
        .status {
            background: #dcfce7;
            color: #166534;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            font-weight: bold;
        }
        button {
            background: #16a34a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 ZYNK Debug Test</h1>
        <div class="status">✅ HTML Working</div>
        <div class="status">✅ CSS Working</div>
        <div class="status">✅ JavaScript Working</div>
        <button onclick="testReact()">Test React</button>
        <button onclick="showConsole()">Show Console</button>
        <div id="reactStatus" style="margin-top: 20px;"></div>
    </div>

    <script>
        console.log('✅ JavaScript loaded successfully!');
        
        function testReact() {
            const reactStatus = document.getElementById('reactStatus');
            reactStatus.innerHTML = '<div class="status">🔄 Testing React...</div>';
            
            // Test if React is available
            if (typeof React !== 'undefined') {
                reactStatus.innerHTML = '<div class="status">✅ React Available</div>';
                console.log('✅ React is available');
            } else {
                reactStatus.innerHTML = '<div class="status">❌ React Not Available</div>';
                console.log('❌ React is not available');
            }
            
            // Test if createRoot is available
            if (typeof createRoot !== 'undefined') {
                reactStatus.innerHTML += '<div class="status">✅ createRoot Available</div>';
                console.log('✅ createRoot is available');
            } else {
                reactStatus.innerHTML += '<div class="status">❌ createRoot Not Available</div>';
                console.log('❌ createRoot is not available');
            }
        }
        
        function showConsole() {
            alert('Open browser console (F12) to see debug information');
        }
        
        // Auto-test after 1 second
        setTimeout(testReact, 1000);
    </script>
</body>
</html>
